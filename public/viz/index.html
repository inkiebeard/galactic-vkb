<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>vkb · Observability</title>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}
</script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root{--bg:#0f0e0c;--surf:#1a1917;--card:#242321;--line:rgba(255,255,255,0.08);--ink:#e8e6df;--muted:#9c9a92;--hint:#6b6a65;--teal:#5dcaa5;--purple:#afa9ec;--amber:#fac775;--coral:#f5c4b3;--mono:'IBM Plex Mono',monospace}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:12px;overflow:hidden}
  #graph{position:fixed;inset:0;display:block;width:100vw;height:100vh}
  header{
    position:fixed;top:0;left:0;right:0;height:44px;z-index:10;
    display:flex;align-items:center;gap:16px;padding:0 20px;
    background:rgba(26,25,23,0.82);backdrop-filter:blur(8px);
    border-bottom:0.5px solid var(--line);
    pointer-events:none;
  }
  header>*{pointer-events:auto}
  .brand{font-size:13px;font-weight:500;color:var(--teal);letter-spacing:0.04em}
  /* nav menu */
  .nav-anchor{position:relative;display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none;padding:4px 8px;margin:-4px -8px;border-radius:5px;transition:background 0.15s}
  .nav-anchor:hover{background:rgba(255,255,255,0.05)}
  .nav-caret{font-size:8px;color:var(--hint);transition:transform 0.2s;line-height:1}
  .nav-anchor[aria-expanded="true"] .nav-caret{transform:rotate(180deg)}
  .nav-popout{display:none;position:absolute;top:calc(100% + 10px);left:0;min-width:180px;background:var(--card);border:0.5px solid rgba(255,255,255,0.14);border-radius:7px;box-shadow:0 8px 24px rgba(0,0,0,0.5);overflow:hidden;z-index:100}
  .nav-popout.open{display:block}
  .nav-section{padding:6px 0;border-bottom:0.5px solid var(--line)}
  .nav-section:last-child{border-bottom:none}
  .nav-section-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--hint);padding:4px 14px 2px}
  .nav-item{display:flex;align-items:center;gap:10px;padding:8px 14px;font-size:11px;color:var(--muted);text-decoration:none;cursor:pointer;transition:background 0.1s,color 0.1s;white-space:nowrap}
  .nav-item:hover{background:rgba(255,255,255,0.05);color:var(--ink)}
  .nav-item.active{color:var(--teal)}
  .nav-item-icon{width:14px;text-align:center;font-style:normal;font-size:12px}
  .nav-item-sub{font-size:9px;color:var(--hint);margin-left:auto}
  .stat{color:var(--muted);font-size:11px}
  .stat span{color:var(--ink);font-weight:500}
  .sidebar{
    position:fixed;top:44px;right:0;bottom:0;width:300px;z-index:10;
    overflow-y:auto;padding:14px;
    background:rgba(26,25,23,0.82);backdrop-filter:blur(8px);
    border-left:0.5px solid var(--line);
    pointer-events:none;
  }
  .sidebar>*{pointer-events:auto}
  .panel{margin-bottom:18px}
  .panel-label{font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--hint);margin-bottom:8px}
  .detail{font-size:11px;color:var(--muted);line-height:1.7}
  .detail strong{color:var(--ink);font-weight:400}
  .badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:500;margin:2px}
  .b-content{background:#04342c;color:#9fe1cb}
  .b-semantic{background:#26215c;color:#cecbf6}
  .b-asserted{background:#4a1b0c;color:#f5c4b3}
  .pill-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
  #events{font-size:10px;color:var(--hint);max-height:140px;overflow-y:auto;line-height:1.8}
  .ev-line{padding:2px 0;border-bottom:0.5px solid var(--line)}
  .ev-ts{color:var(--hint);margin-right:6px}
  .ev-type{color:var(--teal)}
  .ev-detail{color:var(--muted);margin-left:4px}
  #histogram{width:100%;height:80px}
  .legend{display:flex;gap:12px;margin-top:4px}
  .leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
  .leg-dot{width:8px;height:8px;border-radius:50%}
  #tooltip{position:fixed;background:var(--card);border:0.5px solid var(--line);padding:5px 10px;font-size:10px;border-radius:4px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity 0.1s;z-index:20}
  .job-row{display:flex;align-items:baseline;gap:6px;padding:4px 0;border-bottom:0.5px solid var(--line);font-size:10px}
  .job-kind{min-width:40px;color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:0.06em}
  .job-stage{flex:1}
  .job-progress{color:var(--hint);font-size:9px}
  .job-age{color:var(--hint);font-size:9px;min-width:26px;text-align:right}
  .s-queued{color:var(--hint)}
  .s-active{color:var(--amber)}
  .s-done{color:var(--teal)}
  .s-error{color:var(--coral)}
  .ws-live{color:var(--teal)}
  .ws-off{color:var(--hint)}
  #detail{max-height:260px;overflow-y:auto;padding-right:4px}
</style>
</head>
<body>
<canvas id="graph"></canvas>
<div id="tooltip"></div>
<header>
  <div class="nav-anchor" id="nav-anchor" role="button" aria-expanded="false" aria-haspopup="true">
    <div class="brand">vkb</div>
    <span class="nav-caret">&#9660;</span>
    <div class="nav-popout" id="nav-popout">
      <div class="nav-section">
        <div class="nav-section-label">Navigate</div>
        <a class="nav-item" href="/ingest/">
          <i class="nav-item-icon">&#8659;</i> Ingest
        </a>
        <a class="nav-item active" href="/viz/">
          <i class="nav-item-icon">&#10040;</i> Graph Visualiser
          <span class="nav-item-sub">current</span>
        </a>
      </div>
    </div>
  </div>
  <div class="stat">Entities <span id="s-entities">—</span></div>
  <div class="stat">Chunks <span id="s-chunks">—</span></div>
  <div class="stat">Relations <span id="s-relations">—</span></div>
  <div class="stat">Queue <span id="s-queue">—</span></div>
  <div class="stat" style="margin-left:auto" id="ws-status">connecting…</div>
</header>
<div class="sidebar">
  <div class="panel">
    <div class="panel-label">Selected node</div>
    <div id="detail" class="detail">Click a node to inspect</div>
  </div>
  <div class="panel">
    <div class="panel-label">Relation confidence distribution</div>
    <svg id="histogram"></svg>
    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#9fe1cb"></div>content</div>
      <div class="leg-item"><div class="leg-dot" style="background:#cecbf6"></div>semantic</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f5c4b3"></div>asserted</div>
    </div>
  </div>
  <div class="panel">
    <div class="panel-label">Pipeline</div>
    <div id="jobs-list"><div class="detail" style="color:var(--hint)">loading…</div></div>
  </div>
  <div class="panel">
    <div class="panel-label">Live events</div>
    <div id="events"></div>
  </div>
</div>
<script type="module" src="viz.js"></script>
</body>
</html>
